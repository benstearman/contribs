services:
  # --- 1. Web Service (Django Backend) ---
  web:
    build: ./backend
    container_name: contribs_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=\
      - DB_USER=\
      - DB_PASSWORD=\
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=\
      - ALLOWED_HOSTS=\
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    networks:
      - default
      - shared-proxy

  # --- 3. Database (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: contribs_db
    environment:
      - POSTGRES_DB=\
      - POSTGRES_USER=\
      - POSTGRES_PASSWORD=\
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  # --- 4. Portainer (Management) ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: contribs_portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # --- 5. PGAdmin (Database GUI) ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: contribs_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@contribs.app
      - PGADMIN_DEFAULT_PASSWORD=\
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  # --- 6. Wiki.js (Documentation) ---
  wiki:
    image: ghcr.io/requarks/wiki:2
    container_name: contribs_wiki
    restart: unless-stopped
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=\
      - DB_PASS=\
      - DB_NAME=wiki
    ports:
      - "3000:3000"
    volumes:
      - wiki_data:/wiki
    depends_on:
      - db
    networks:
      - default
      - shared-proxy

  # --- 7. Vaultwarden (Passwords) ---
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: contribs_vaultwarden
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://\:\@db:5432/vaultwarden
      - SIGNUPS_ALLOWED=true
    volumes:
      - vaultwarden_data:/data
    depends_on:
      - db
    networks:
      - default
      - shared-proxy

  # --- 8. Cloudflare Tunnel ---
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: contribs_tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=\
    networks:
      - default
      - shared-proxy

networks:
  default:
  shared-proxy:
    external: true

volumes:
  postgres_data:
  portainer_data:
  pgadmin_data:
  wiki_data:
  vaultwarden_data:
